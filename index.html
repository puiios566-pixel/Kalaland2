<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>کافی‌لند</title>
<link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
<script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
/* ===== تمام استایل‌های اصلی با اصلاحات ===== */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--b:#3E2723;--m:#5D4037;--l:#8D6E63;--a:#C8956C;--bg:#F5F0EB;--w:#fff;--t:#2C1810;--g:#9E8E82;--d:#E8DDD3;--ok:#4CAF50;--no:#E53935}
body{font-family:'Vazirmatn',sans-serif;background:var(--bg);color:var(--t);max-width:480px;margin:0 auto;min-height:100vh;overflow-x:hidden;padding-bottom:80px;font-size:16px}
/* ===== هدر با آیکون مدیر در سمت چپ ===== */
.hdr{background:var(--w);padding:10px 14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.hd-t{display:flex;align-items:center;justify-content:space-between}
.hd-left{display:flex;align-items:center;gap:6px}
.hd-left .admin-btn{width:40px;height:40px;border-radius:10px;border:none;background:var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:22px;color:var(--m);transition:.15s}
.hd-left .admin-btn:hover{background:var(--d)}
.hd-left .menu-btn{width:40px;height:40px;border-radius:10px;border:none;background:var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:26px;color:var(--m);transition:.15s}
.hd-left .menu-btn:hover{background:var(--d)}
.hd-logo{font-size:20px;font-weight:900;color:var(--b);cursor:pointer;flex:1;text-align:center}
.hd-logo small{font-weight:400;color:var(--g);font-size:12px}
.hd-sub{font-size:13px;color:var(--g);margin:4px 0 6px;display:flex;align-items:center;justify-content:space-between}
.hd-sub .phone{display:flex;align-items:center;gap:4px;font-size:17px;font-weight:800;color:var(--m)}
.hd-sub .phone .iconify{font-size:18px}
.hd-sub .phone a{color:var(--m);text-decoration:none}
.hd-bt{display:flex;align-items:center;gap:8px;margin-top:4px}
.sb{flex:1;display:flex;align-items:center;background:var(--bg);border-radius:10px;padding:8px 12px;gap:6px}
.sb input{border:none;background:none;outline:none;font-family:inherit;font-size:14px;width:100%}
.soc-r{display:flex;gap:8px;align-items:center}
.soc-r .soc-item{display:flex;flex-direction:column;align-items:center;cursor:pointer;text-decoration:none;color:var(--t);transition:.15s}
.soc-r .soc-item:hover{transform:scale(1.05)}
.soc-r .soc-item .iconify{font-size:28px}
.soc-r .soc-item span{font-size:9px;color:var(--g);margin-top:2px;font-weight:600}
/* ... (بقیه استایل‌ها به‌صورت کامل مثل قبل) ... */
/* برای اختصار، استایل‌های تکراری رو اینجا نمی‌نویسم ولی در کد نهایی کامل هست */
</style>
</head>
<body>
<!-- ===== هدر با آیکون مدیر در سمت چپ ===== -->
<div class="hdr">
  <div class="hd-t">
    <div class="hd-left">
      <button class="admin-btn" onclick="openAdm()" title="ورود مدیر">⚙️</button>
      <button class="menu-btn" onclick="toggleHamburger()">☰</button>
    </div>
    <div class="hd-logo" onclick="goHome()">☕ کافی‌لند <small>| اصفهان</small></div>
    <div style="width:40px"></div>
  </div>
  <!-- ... (بقیه هدر مثل قبل) ... -->
</div>

<!-- ... (بقیه HTMLها مثل قبل) ... -->

<script>
// ============================================================
// تابع فاکتور با اصلاحات کامل
// ============================================================
function drawInvoice(cNm, cPh, cCity) {
  try {
    var W = 800,
      pd = 36,
      rH = 56,
      hH = 44,
      total = 0;
    var rows = cart.map(function(ci) {
      var p = prods.find(function(pr) { return pr.id === ci.id; });
      if (!p) return null;
      var t = p.l * ci.q;
      total += t;
      return { p: p, q: ci.q, t: t, o: ci.o };
    }).filter(Boolean);

    var tH = 200 + hH + rows.length * rH + 60 + 80 + 70 + pd;
    var c = document.createElement('canvas');
    c.width = W;
    c.height = tH;
    var x = c.getContext('2d');

    // پس‌زمینه سفید
    x.fillStyle = '#FFFFFF';
    x.fillRect(0, 0, W, tH);

    // هدر - گرادیان قهوه‌ای
    var gr = x.createLinearGradient(0, 0, W, 0);
    gr.addColorStop(0, '#3E2723');
    gr.addColorStop(1, '#5D4037');
    x.fillStyle = gr;
    rr(x, 0, 0, W, 115);
    x.fill();

    // عنوان فروشگاه (با رنگ سفید و خوانا)
    x.fillStyle = '#FFFFFF';
    x.font = 'bold 32px Vazirmatn';
    x.textAlign = 'center';
    x.direction = 'rtl';
    x.fillText('کافی‌لند - اصفهان', W / 2, 45);

    // اطلاعات مشتری (با فونت بزرگ و سفید)
    x.fillStyle = 'rgba(255,255,255,0.95)';
    x.font = 'bold 20px Vazirmatn';
    x.fillText('مشتری: ' + cNm, W / 2, 80);
    x.font = '17px Vazirmatn';
    x.fillText('شهر: ' + cCity + ' | موبایل: ' + cPh, W / 2, 108);

    // شماره و تاریخ (در سمت راست)
    var iN = parseInt(localStorage.getItem('kl_i') || '1000') + 1;
    localStorage.setItem('kl_i', String(iN));
    var ds = new Date().toLocaleDateString('fa-IR'),
      ts = new Date().toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit' });
    x.fillStyle = '#8D6E63';
    x.font = '13px Vazirmatn';
    x.textAlign = 'right';
    x.fillText('تاریخ: ' + ds + '  |  ساعت: ' + ts + '  |  شماره: #' + iN, W - pd, 140);

    // خط جداکننده
    x.strokeStyle = '#E8DDD3';
    x.lineWidth = 1.5;
    x.beginPath();
    x.moveTo(pd, 152);
    x.lineTo(W - pd, 152);
    x.stroke();

    // هدر جدول
    var y = 162;
    x.fillStyle = '#5D4037';
    rr(x, pd, y, W - pd * 2, hH, 6);
    x.fill();
    x.fillStyle = '#FFFFFF';
    x.font = 'bold 14px Vazirmatn';
    x.textAlign = 'center';

    // ستون‌های جدید: ردیف - عکس + عنوان کالا - واحد - تعداد - قیمت واحد - جمع کل
    var colWidths = [50, 280, 80, 70, 110, 130];
    var startX = pd + 10;
    var positions = [];
    var currentX = startX;
    for (var i = 0; i < colWidths.length; i++) {
      positions.push(currentX);
      currentX += colWidths[i];
    }

    x.fillText('ردیف', positions[0] + colWidths[0] / 2, y + 26);
    x.fillText('عنوان کالا', positions[1] + colWidths[1] / 2, y + 26);
    x.fillText('واحد', positions[2] + colWidths[2] / 2, y + 26);
    x.fillText('تعداد', positions[3] + colWidths[3] / 2, y + 26);
    x.fillText('قیمت واحد', positions[4] + colWidths[4] / 2, y + 26);
    x.fillText('جمع کل', positions[5] + colWidths[5] / 2, y + 26);

    y += hH;

    // حلقه برای هر سطر
    rows.forEach(function(r, i) {
      // پس‌زمینه متناوب
      if (i % 2 === 0) {
        x.fillStyle = '#F8F5F2';
        x.fillRect(pd, y, W - pd * 2, rH);
      }
      x.strokeStyle = '#F0EBE5';
      x.lineWidth = 0.5;
      x.beginPath();
      x.moveTo(pd, y + rH);
      x.lineTo(W - pd, y + rH);
      x.stroke();

      x.textAlign = 'center';
      x.fillStyle = '#2C1810';
      x.font = '13px Vazirmatn';

      // ستون ردیف
      x.fillText(String(i + 1), positions[0] + colWidths[0] / 2, y + 32);

      // ستون عنوان کالا (با عکس بند انگشتی)
      var imgSize = 32;
      var imgX = positions[1] + 8;
      var imgY = y + (rH - imgSize) / 2;

      // رسم عکس بند انگشتی
      if (r.p.img) {
        try {
          var img = new Image();
          img.crossOrigin = 'Anonymous';
          img.src = r.p.img;
          if (img.complete && img.naturalWidth > 0) {
            x.save();
            x.beginPath();
            x.arc(imgX + imgSize / 2, imgY + imgSize / 2, imgSize / 2, 0, Math.PI * 2);
            x.closePath();
            x.clip();
            x.drawImage(img, imgX, imgY, imgSize, imgSize);
            x.restore();
          } else {
            x.font = '20px Vazirmatn';
            x.textAlign = 'center';
            x.fillStyle = '#D5CFC8';
            x.fillText('📦', imgX + imgSize / 2, imgY + imgSize - 4);
          }
        } catch (e) {
          x.font = '20px Vazirmatn';
          x.textAlign = 'center';
          x.fillStyle = '#D5CFC8';
          x.fillText('📦', imgX + imgSize / 2, imgY + imgSize - 4);
        }
      } else {
        x.font = '20px Vazirmatn';
        x.textAlign = 'center';
        x.fillStyle = '#D5CFC8';
        x.fillText('📦', imgX + imgSize / 2, imgY + imgSize - 4);
      }

      // نام محصول (کنار عکس)
      x.textAlign = 'right';
      var nm = r.p.n;
      if (r.o) {
        Object.keys(r.o).forEach(function(k) {
          nm += ' (' + r.o[k] + ')';
        });
      }
      // محدود کردن طول نام
      while (x.measureText(nm).width > (colWidths[1] - imgSize - 16) && nm.length > 0) {
        nm = nm.slice(0, -1);
      }
      if (nm !== r.p.n) nm += '...';
      x.fillStyle = '#2C1810';
      x.font = '13px Vazirmatn';
      x.fillText(nm, positions[1] + colWidths[1] - 8, y + 32);

      // سایر ستون‌ها
      x.textAlign = 'center';
      x.fillStyle = '#2C1810';
      x.font = '13px Vazirmatn';
      x.fillText(r.p.u, positions[2] + colWidths[2] / 2, y + 32);
      x.fillText(String(r.q), positions[3] + colWidths[3] / 2, y + 32);

      // قیمت واحد (با رنگ تیره‌تر)
      x.fillStyle = '#5D4037';
      x.font = 'bold 13px Vazirmatn';
      x.fillText(fp(r.p.l), positions[4] + colWidths[4] / 2, y + 32);

      // جمع کل (با رنگ تیره‌تر)
      x.fillStyle = '#5D4037';
      x.font = 'bold 13px Vazirmatn';
      x.fillText(fp(r.t), positions[5] + colWidths[5] / 2, y + 32);

      y += rH;
    });

    // جمع کل فاکتور
    y += 8;
    x.fillStyle = '#F5E6D3';
    rr(x, pd, y, W - pd * 2, 50, 6);
    x.fill();
    x.fillStyle = '#3E2723';
    x.font = 'bold 18px Vazirmatn';
    x.textAlign = 'right';
    x.fillText('جمع کل فاکتور:', W - pd - 20, y + 32);
    x.textAlign = 'left';
    x.fillText(fp(total) + ' تومان', pd + 20, y + 32);

    // خط پایانی
    y += 60;
    x.strokeStyle = '#E8DDD3';
    x.lineWidth = 1.5;
    x.beginPath();
    x.moveTo(pd, y);
    x.lineTo(W - pd, y);
    x.stroke();

    // پیام پایانی
    y += 24;
    x.fillStyle = '#8D6E63';
    x.font = '13px Vazirmatn';
    x.textAlign = 'center';
    x.fillText('☕ از خرید شما سپاسگزاریم ☕', W / 2, y);

    // حاشیه فاکتور
    x.strokeStyle = '#E8DDD3';
    x.lineWidth = 2;
    x.strokeRect(2, 2, W - 4, tH - 4);

    invCvs = c;
    var imgD = c.toDataURL('image/jpeg', 0.95);
    document.getElementById('invW').innerHTML =
      '<button class="bk" onclick="goPage(\'c\',document.querySelectorAll(\'.nv\')[2])"><span class="iconify" data-icon="mdi:arrow-right" style="font-size:16px"></span> بازگشت</button>' +
      '<img src="' + imgD + '" alt="فاکتور">' +
      '<div class="ia"><button class="bk" style="background:#25D366;color:#fff;margin-bottom:0" onclick="shareInv()"><span class="iconify" data-icon="mdi:share-variant" style="font-size:16px"></span>ارسال</button>' +
      '<button class="bk" style="background:var(--m);color:#fff" onclick="saveInv()"><span class="iconify" data-icon="mdi:download" style="font-size:16px"></span>ذخیره عکس</button></div>';
    goPage('i', null);
  } catch (e) {
    console.warn('drawInvoice error:', e);
    toast('خطا در تولید فاکتور', 'er');
  }
}

// ... (بقیه کدها مثل قبل) ...
</script>
</body>
</html>
