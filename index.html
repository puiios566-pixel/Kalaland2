<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>کافی‌لند</title>
<link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
<script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
/* ===== تمام استایل‌های کامل (مشابه قبل) ===== */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--b:#3E2723;--m:#5D4037;--l:#8D6E63;--a:#C8956C;--bg:#F5F0EB;--w:#fff;--t:#2C1810;--g:#9E8E82;--d:#E8DDD3;--ok:#4CAF50;--no:#E53935;--mango:#E67E22}
body{font-family:'Vazirmatn',sans-serif;background:var(--bg);color:var(--t);max-width:480px;margin:0 auto;min-height:100vh;overflow-x:hidden;padding-bottom:80px;font-size:16px}
/* ... (استایل‌های قبلی به‌صورت کامل) ... */
/* برای اختصار، استایل‌های تکراری در اینجا حذف شده، ولی در کد نهایی کامل وجود دارند */
</style>
</head>
<body>
<!-- ===== تمام HTMLها به‌صورت کامل مثل قبل ===== -->
<!-- ... -->

<!-- ===== بخش مدیریت محصولات (xpr) با فیلتر و ویرایش ===== -->
<div class="apl" id="xpr">
<h4 style="font-size:14px;font-weight:900;margin-bottom:10px">➕ افزودن محصول جدید</h4>
<!-- فرم افزودن محصول (مثل قبل) -->
<div class="f2"><label>نام محصول *</label><input type="text" id="pNm" placeholder="نام محصول" oninput="document.getElementById('pSearchResult').innerHTML=''"></div>
<div class="f2"><label>دسته‌بندی</label><select id="pCat"></select></div>
<div class="f2"><label>توضیح کوتاه</label><input type="text" id="pDesc" placeholder="اختیاری"></div>
<div class="fw3">
  <div class="f2"><label>واحد</label><select id="pUnit"><option>کیلوگرم</option><option>گرم</option><option>تعداد</option><option>بسته</option></select></div>
  <div class="f2"><label>قیمت خرید</label><input type="number" id="pBuy" placeholder="0" dir="ltr"></div>
  <div class="f2"><label>قیمت خرده (تومان) *</label><input type="number" id="pSell" placeholder="0" dir="ltr"></div>
</div>
<div class="f2"><label>قیمت عمده (تومان) *</label><input type="number" id="pWholesale" placeholder="0" dir="ltr"></div>
<div class="f2"><label>لینک عکس</label><div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap"><input type="text" id="pUrl" placeholder="https://..." dir="ltr" style="flex:1;min-width:120px"><button class="bt" style="padding:5px 10px;font-size:12px;margin:0;width:auto;background:var(--l)" onclick="searchImage()">🔍 جستجوی عکس</button></div>
<div id="pSearchResult" style="margin-top:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap"><img id="pPreviewImg" src="" alt="پیش‌نمایش" style="max-width:70px;max-height:70px;border-radius:6px;display:none;border:1px solid var(--d)"><span id="pSearchStatus" style="font-size:11px;color:var(--g)"></span></div></div>
<div class="f2"><label>آپلود عکس (فشرده خودکار)</label><input type="file" id="pFile" accept="image/*" style="font-size:12px"></div>
<div class="f2"><label>ویژگی‌ها</label><div id="pOptsContainer"></div></div>
<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px"><label class="och"><input type="checkbox" id="pIsOf"> فروش شگفت‌انگیز</label><label class="och"><input type="checkbox" id="pIsSg"> پیشنهاد ویژه</label></div>
<button class="bt" onclick="addProd()">➕ افزودن محصول</button>

<!-- ===== بخش فیلتر و جستجو ===== -->
<div style="margin-top:20px;border-top:2px solid var(--d);padding-top:14px">
  <h4 style="font-size:14px;font-weight:900;margin-bottom:10px">🔍 فیلتر و جستجوی محصولات</h4>
  <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;align-items:center">
    <!-- جستجوی لحظه‌ای -->
    <div style="flex:2;min-width:160px">
      <input type="text" id="filterSearch" placeholder="جستجوی نام محصول..." style="width:100%;padding:8px 10px;border:2px solid var(--d);border-radius:8px;font-family:inherit;font-size:13px;outline:none" oninput="applyProductFilters()">
    </div>
    <!-- فیلتر دسته‌بندی اصلی -->
    <div style="flex:1;min-width:120px">
      <select id="filterMainCat" style="width:100%;padding:8px 10px;border:2px solid var(--d);border-radius:8px;font-family:inherit;font-size:13px;outline:none;background:var(--w)" onchange="updateSubFilter();applyProductFilters()">
        <option value="0">📂 همه دسته‌ها</option>
      </select>
    </div>
    <!-- فیلتر دسته‌بندی فرعی -->
    <div style="flex:1;min-width:120px">
      <select id="filterSubCat" style="width:100%;padding:8px 10px;border:2px solid var(--d);border-radius:8px;font-family:inherit;font-size:13px;outline:none;background:var(--w)" onchange="applyProductFilters()">
        <option value="0">📂 همه زیرمجموعه‌ها</option>
      </select>
    </div>
  </div>
  <div style="font-size:12px;color:var(--g);margin-bottom:6px">
    <span id="filterResultCount">۰</span> محصول یافت شد
  </div>
</div>

<!-- ===== لیست محصولات با قابلیت ویرایش ===== -->
<h4 style="font-size:14px;font-weight:900;margin:16px 0 10px">📦 لیست محصولات</h4>
<div id="pListContainer" style="max-height:500px;overflow-y:auto;border:1.5px solid var(--d);border-radius:10px;padding:4px;background:var(--bg)">
  <div id="pList"></div>
</div>

<!-- ===== پنل ویرایش محصول ===== -->
<div id="editPanel" style="display:none;margin-top:16px;background:var(--w);border-radius:12px;padding:16px;border:2px solid var(--m);box-shadow:0 4px 16px rgba(0,0,0,.1)">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <h4 style="font-size:16px;font-weight:900">✏️ ویرایش محصول</h4>
    <button onclick="closeEditPanel()" style="background:none;border:none;font-size:22px;cursor:pointer;color:var(--g)">✕</button>
  </div>
  <div id="editForm"></div>
</div>
</div>

<script>
// ============================================================
// توابع فیلتر و جستجوی محصولات
// ============================================================
var filterMainCat = 0;
var filterSubCat = 0;
var filterSearchText = '';

function populateFilterCats(){
  try{
    var mainSelect = document.getElementById('filterMainCat');
    if(mainSelect){
      var mainCats = cats.filter(function(c){ return c.p===0; });
      var html = '<option value="0">📂 همه دسته‌ها</option>';
      mainCats.forEach(function(c){ html += '<option value="'+c.id+'">'+c.n+'</option>'; });
      mainSelect.innerHTML = html;
    }
    updateSubFilter();
  }catch(e){ console.warn(e); }
}

function updateSubFilter(){
  try{
    var subSelect = document.getElementById('filterSubCat');
    if(!subSelect) return;
    var mainId = parseInt(document.getElementById('filterMainCat').value);
    var subCats = cats.filter(function(c){ return c.p===mainId; });
    var html = '<option value="0">📂 همه زیرمجموعه‌ها</option>';
    subCats.forEach(function(c){ html += '<option value="'+c.id+'">'+c.n+'</option>'; });
    subSelect.innerHTML = html;
    applyProductFilters();
  }catch(e){ console.warn(e); }
}

function applyProductFilters(){
  try{
    filterMainCat = parseInt(document.getElementById('filterMainCat').value) || 0;
    filterSubCat = parseInt(document.getElementById('filterSubCat').value) || 0;
    filterSearchText = document.getElementById('filterSearch').value.trim().toLowerCase();

    var filtered = prods.filter(function(p){
      // فیلتر دسته‌بندی اصلی
      if(filterMainCat !== 0){
        var cat = cats.find(function(c){ return c.id===p.c; });
        if(!cat) return false;
        var root = cat;
        while(root.p !== 0){
          var parent = cats.find(function(c){ return c.id===root.p; });
          if(!parent) break;
          root = parent;
        }
        if(root.id !== filterMainCat) return false;
      }
      // فیلتر دسته‌بندی فرعی
      if(filterSubCat !== 0 && p.c !== filterSubCat) return false;
      // جستجوی نام
      if(filterSearchText){
        if((p.n || '').toLowerCase().indexOf(filterSearchText) === -1) return false;
      }
      return true;
    });

    document.getElementById('filterResultCount').textContent = filtered.length;
    renderFilteredProductList(filtered);
  }catch(e){ console.warn(e); }
}

function renderFilteredProductList(list){
  try{
    var container = document.getElementById('pList');
    if(!container) return;
    if(!list || !list.length){
      container.innerHTML = '<div class="nr" style="padding:20px;text-align:center;color:var(--g)">محصولی یافت نشد</div>';
      return;
    }
    var html = '';
    list.forEach(function(p){
      var cat = cats.find(function(c){ return c.id===p.c; });
      var catName = cat ? cat.n : 'بدون دسته';
      html += '<div class="di" style="cursor:pointer;transition:.15s;border-left:4px solid var(--m)" onclick="openEditProduct('+p.id+')">';
      html += '<div class="nf" style="flex:1;min-width:0">';
      html += '<h4 style="font-size:14px;font-weight:800">'+p.n+(p.dc?' <span style="font-size:12px;color:var(--g);font-weight:600">- '+p.dc+'</span>':'')+'</h4>';
      html += '<p style="font-size:13px;font-weight:700;color:var(--m);direction:ltr;margin-top:2px">خرده: '+fp(p.l)+' | عمده: '+fp(p.w)+' تومان / '+p.u+' | '+catName+'</p>';
      html += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:3px">';
      if(p.isOf) html += '<span style="font-size:10px;font-weight:700;background:var(--no);color:#fff;padding:2px 8px;border-radius:10px">🔥 شگفت‌انگیز</span>';
      if(p.isSg) html += '<span style="font-size:10px;font-weight:700;background:#FF9800;color:#fff;padding:2px 8px;border-radius:10px">⭐ پیشنهاد</span>';
      html += '</div></div>';
      html += '<div style="display:flex;gap:6px">';
      html += '<button class="dl" onclick="event.stopPropagation();openEditProduct('+p.id+')" title="ویرایش" style="background:var(--m);color:#fff;border:none;width:34px;height:34px;border-radius:8px;font-size:16px">✏️</button>';
      html += '<button class="dl" onclick="event.stopPropagation();if(confirm(\'آیا از حذف این محصول اطمینان دارید؟\')){delProd('+p.id+')}" title="حذف" style="color:var(--no);width:34px;height:34px;border-radius:8px;font-size:16px">🗑️</button>';
      html += '</div></div>';
    });
    container.innerHTML = html;
  }catch(e){ console.warn(e); }
}

// ============================================================
// باز کردن پنل ویرایش محصول
// ============================================================
var editingProdId = null;

function openEditProduct(id){
  try{
    var p = prods.find(function(pr){ return pr.id===id; });
    if(!p){ toast('محصول یافت نشد','er'); return; }
    editingProdId = id;
    var panel = document.getElementById('editPanel');
    var form = document.getElementById('editForm');

    // ساخت فرم ویرایش (همانند فرم افزودن با داده‌های محصول)
    var optsHtml = '';
    opts.forEach(function(o){
      var checked = (p.o && p.o.indexOf(o.id) !== -1) ? 'checked' : '';
      optsHtml += '<div><label class="och"><input type="checkbox" value="'+o.id+'" '+checked+' onchange="updateEditOptValues(this)"><span>'+o.n+'</span></label>';
      optsHtml += '<div class="edit-opt-vals" id="edit-opt-vals-'+o.id+'" style="margin-right:20px;margin-top:4px;font-size:12px;color:var(--g);display:'+(checked?'block':'none')+'">';
      o.v.forEach(function(v){
        var sel = (p.o && p.o.indexOf(o.id) !== -1 && p._optVals && p._optVals[o.id] === v) ? 'checked' : '';
        optsHtml += '<label style="display:inline-block;margin-left:10px"><input type="radio" name="edit-opt-'+o.id+'" value="'+v+'" '+sel+'> '+v+'</label>';
      });
      optsHtml += '</div></div>';
    });

    var catOptions = catOptsHtml(p.c);
    var unitOptions = ['کیلوگرم','گرم','تعداد','بسته'].map(function(u){
      return '<option value="'+u+'"'+(p.u===u?' selected':'')+'>'+u+'</option>';
    }).join('');

    form.innerHTML = 
      '<div class="f2"><label>نام محصول *</label><input type="text" id="editPName" value="'+p.n+'"></div>'+
      '<div class="f2"><label>دسته‌بندی</label><select id="editPCat">'+catOptions+'</select></div>'+
      '<div class="f2"><label>توضیح کوتاه</label><input type="text" id="editPDesc" value="'+(p.dc||'')+'"></div>'+
      '<div class="fw3">'+
        '<div class="f2"><label>واحد</label><select id="editPUnit">'+unitOptions+'</select></div>'+
        '<div class="f2"><label>قیمت خرید</label><input type="number" id="editPBuy" value="'+(p.b||0)+'" dir="ltr"></div>'+
        '<div class="f2"><label>قیمت خرده (تومان) *</label><input type="number" id="editPSell" value="'+(p.l||0)+'" dir="ltr"></div>'+
      '</div>'+
      '<div class="f2"><label>قیمت عمده (تومان) *</label><input type="number" id="editPWholesale" value="'+(p.w||0)+'" dir="ltr"></div>'+
      '<div class="f2"><label>لینک عکس</label><input type="text" id="editPUrl" value="'+(p.img||'')+'" dir="ltr"></div>'+
      '<div class="f2"><label>ویژگی‌ها</label><div class="ocr">'+optsHtml+'</div></div>'+
      '<div style="display:flex;gap:12px;flex-wrap:wrap;margin:10px 0">'+
        '<label class="och"><input type="checkbox" id="editPIsOf" '+(p.isOf?'checked':'')+'> فروش شگفت‌انگیز</label>'+
        '<label class="och"><input type="checkbox" id="editPIsSg" '+(p.isSg?'checked':'')+'> پیشنهاد ویژه</label>'+
      '</div>'+
      '<div style="display:flex;gap:8px;margin-top:12px">'+
        '<button class="bt" onclick="saveEditProduct()" style="flex:1;background:var(--ok);color:#fff">💾 ذخیره تغییرات</button>'+
        '<button class="bt" onclick="closeEditPanel()" style="flex:1;background:var(--bg);color:var(--t)">❌ انصراف</button>'+
      '</div>';

    panel.style.display = 'block';
    panel.scrollIntoView({behavior:'smooth'});
  }catch(e){ console.warn(e); }
}

function closeEditPanel(){
  document.getElementById('editPanel').style.display = 'none';
  editingProdId = null;
}

function updateEditOptValues(cb){
  try{
    var id = cb.value;
    var container = document.getElementById('edit-opt-vals-'+id);
    if(!container) return;
    if(cb.checked){
      container.style.display = 'block';
      container.querySelectorAll('input').forEach(function(inp){ inp.disabled = false; });
    } else {
      container.style.display = 'none';
      container.querySelectorAll('input').forEach(function(inp){ inp.disabled = true; inp.checked = false; });
    }
  }catch(e){ console.warn(e); }
}

function saveEditProduct(){
  try{
    var id = editingProdId;
    if(!id){ toast('خطا: محصولی برای ویرایش انتخاب نشده','er'); return; }
    var nm = document.getElementById('editPName').value.trim();
    var ci = parseInt(document.getElementById('editPCat').value);
    var dc = document.getElementById('editPDesc').value.trim();
    var u = document.getElementById('editPUnit').value;
    var b = parseInt(document.getElementById('editPBuy').value) || 0;
    var l = parseInt(document.getElementById('editPSell').value);
    var w = parseInt(document.getElementById('editPWholesale').value);
    var url = document.getElementById('editPUrl').value.trim();
    var isOf = document.getElementById('editPIsOf').checked;
    var isSg = document.getElementById('editPIsSg').checked;

    if(!nm || !l || !w){ toast('نام و قیمت خرده و عمده الزامی است','er'); return; }

    var oids = [];
    var optVals = {};
    document.querySelectorAll('#editForm .ocr input[type="checkbox"]:checked').forEach(function(cb){
      var oid = parseInt(cb.value);
      oids.push(oid);
      var radio = document.querySelector('input[name="edit-opt-'+oid+'"]:checked');
      if(radio) optVals[oid] = radio.value;
    });

    var p = prods.find(function(pr){ return pr.id===id; });
    if(p){
      p.n = nm; p.c = ci; p.dc = dc; p.u = u; p.b = b; p.l = l; p.w = w;
      p.img = url; p.o = oids; p._optVals = optVals; p.isOf = isOf; p.isSg = isSg;
      sv('kl_p', prods);
      renderProdsAdm();
      renderSections();
      renderProducts();
      updateBadge();
      closeEditPanel();
      toast('محصول با موفقیت ویرایش شد','ok');
    }
  }catch(e){ console.warn(e); }
}

// ============================================================
// به‌روزرسانی تابع renderProdsAdm برای استفاده از فیلتر
// ============================================================
function renderProdsAdm(){
  try{
    document.getElementById('pCat').innerHTML = catOptsHtml(0);
    // ویژگی‌ها
    var container = document.getElementById('pOptsContainer');
    var h = '<div class="ocr">';
    opts.forEach(function(o){
      h += '<div><label class="och"><input type="checkbox" value="'+o.id+'" onchange="updateOptValues(this)"><span>'+o.n+'</span></label>';
      h += '<div class="opt-values" id="opt-vals-'+o.id+'" style="display:none;margin-right:20px;margin-top:4px;font-size:12px;color:var(--g)">';
      o.v.forEach(function(v){
        h += '<label style="display:inline-block;margin-left:10px"><input type="radio" name="opt-'+o.id+'" value="'+v+'" disabled> '+v+'</label>';
      });
      h += '</div></div>';
    });
    h += '</div>';
    container.innerHTML = h;

    // پر کردن فیلترها و نمایش لیست
    populateFilterCats();
    applyProductFilters();
  }catch(e){ console.warn(e); }
}
// ============================================================
// ادامه‌ی کدهای قبلی (داده‌ها، توابع کمکی، سبد خرید، فاکتور و...)
// ============================================================
// ... (بقیه کدها به‌صورت کامل مثل قبل)
</script>
</body>
</html>
